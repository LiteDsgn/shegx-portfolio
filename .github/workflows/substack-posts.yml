name: Update Substack posts

on:
  schedule:
    - cron: '17 */6 * * *' # every 6 hours
  workflow_dispatch: {} # manual "run now" from the Actions tab

permissions:
  contents: write

jobs:
  update-posts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest posts
        run: python3 scripts/fetch_substack_posts.py

      - name: Commit snapshot if changed
        run: |
          git add data/posts.json
          if git diff --cached --quiet; then
            echo "No new posts."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update Substack posts snapshot"
          git push
